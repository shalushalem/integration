name: myapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.3.3
  http: ^1.5.0
  image_picker: ^1.1.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  speech_to_text: ^7.3.0
  camera: ^0.10.5+9
  intl: ^0.20.2
  permission_handler: ^11.3.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  flutter_local_notifications: ^17.0.0
  file_picker: ^8.0.0
  url_launcher: ^6.2.5
  open_filex: ^4.3.4
  mime: ^1.0.5
  sqflite: ^2.4.2
  path: ^1.9.1
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  
  # Backend Integration
  appwrite: any
  flutter_dotenv: any
  minio: ^3.5.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Environment Variables
  assets:
    - .env
    - assets/body_shapes/
    - assets/styles/
    - assets/shop/
    - assets/images/
    - assets/lang/
